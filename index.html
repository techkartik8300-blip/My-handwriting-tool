<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HandScript AI</title>

<link rel="stylesheet" href="script.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Caveat:wght@700&family=Indie+Flower&family=Shadows+Into+Light&family=Satisfy&family=Kalam:wght@700&family=Handlee&family=Patrick+Hand&family=Architects+Daughter&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

<h1>HandScript AI</h1>

<h3>Customize Handwriting</h3>

<label><b>Font Family:</b></label>
<select id="fontSelect">
<option value="'Dancing Script', cursive">Dancing Script</option>
<option value="'Pacifico', cursive">Pacifico</option>
<option value="'Caveat', cursive">Caveat</option>
<option value="'Indie Flower', cursive">Indie Flower</option>
<option value="'Shadows Into Light', cursive">Shadows Into Light</option>
<option value="'Satisfy', cursive">Satisfy</option>
<option value="'Kalam', cursive">Kalam</option>
<option value="'Handlee', cursive">Handlee</option>
<option value="'Patrick Hand', cursive">Patrick Hand</option>
<option value="'Architects Daughter', cursive">Architects Daughter</option>
</select>

<br><br>

<label><b>Font Size:</b></label>
<select id="fontSize">
<option value="12">12 px</option>
<option value="14">14 px</option>
<option value="16">16 px</option>
<option value="18">18 px</option>
<option value="20">20 px</option>
<option value="22">22 px</option>
<option value="24">24 px</option>
<option value="26">26 px</option>
<option value="28" selected>28 px</option>
<option value="30">30 px</option>
<option value="32">32 px</option>
<option value="36">36 px</option>
<option value="40">40 px</option>
<option value="48">48 px</option>
<option value="60">60 px</option>
</select>

<br><br>

<label><b>Text Style:</b></label>
<select id="fontWeight">
<option value="normal" selected>Normal</option>
<option value="bold">Bold</option>
</select>

<br><br>

<label><b>Ink Color:</b></label>
<input type="color" id="inkColor" value="#2c3e50">

<br><br>

<textarea id="userInput" placeholder="Type your text here..."></textarea>

<h3>Upload Handwriting Image</h3>

<input type="file" id="handwritingImage" accept="image/*">

<img id="previewImage">

<br><br>

<button onclick="downloadLetter()">
Download as Image
</button>

<h3>Preview</h3>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
